<section class="reset-wrap">
  <div class="reset-card">

    <header class="reset-header">
      <h1>Nova senha</h1>
      <p class="muted">Defina uma nova senha para sua conta.</p>
    </header>

    <form id="resetForm" class="reset-form" autocomplete="on">
      <label class="field">
        <span class="label">NOVA SENHA</span>
        <input id="newPassword" name="newPassword" type="password" placeholder="••••••••" autocomplete="new-password" required />
      </label>

      <div class="reset-actions">
        <button class="btn btn-primary" type="submit">Salvar senha</button>
        <button class="btn" type="button" id="btnBackLogin">Voltar</button>
      </div>
    </form>

    <div class="small muted" style="margin-top:12px">
      Se você chegou aqui pelo e-mail de recuperação, o Supabase vai validar sua sessão automaticamente.
    </div>

  </div>
</section>
