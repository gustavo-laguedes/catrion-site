<section class="reset-wrap">
  <div class="reset-card">

    <header class="reset-header">
      <h1>Primeiro acesso</h1>
      <p class="muted">Complete seus dados e defina sua senha para entrar no portal.</p>
    </header>

    <form id="firstAccessForm" class="reset-form" autocomplete="on">
      <label class="field">
        <span class="label">NOME COMPLETO</span>
        <input id="firstAccessName" name="firstAccessName" type="text" placeholder="Seu nome completo" required />
      </label>

      <label class="field">
        <span class="label">TELEFONE</span>
        <input id="firstAccessPhone" name="firstAccessPhone" type="text" placeholder="(00) 00000-0000" />
      </label>

      <label class="field">
        <span class="label">NOVA SENHA</span>
        <input id="firstAccessPassword" name="firstAccessPassword" type="password" placeholder="••••••••" autocomplete="new-password" required />
      </label>

      <label class="field">
        <span class="label">CONFIRMAR SENHA</span>
        <input id="firstAccessPasswordConfirm" name="firstAccessPasswordConfirm" type="password" placeholder="••••••••" autocomplete="new-password" required />
      </label>

      <div class="small muted" id="firstAccessHint" style="margin-top:4px;">
        Preencha seus dados e use pelo menos 8 caracteres na senha.
      </div>

      <div class="reset-actions">
        <button class="btn btn-primary" type="submit" id="btnSaveFirstAccess">Concluir primeiro acesso</button>
        <button class="btn" type="button" id="btnBackToLoginFromFirstAccess">Voltar</button>
      </div>
    </form>

  </div>
</section>
